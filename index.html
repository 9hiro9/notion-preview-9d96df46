<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #f7f8fa;
  --surface: #ffffff;
  --border: #eceef2;
  --border-strong: #dde0e6;
  --text: #1a1d24;
  --muted: #6b7280;
  --primary: #2383e2;
  --primary-hover: #1a6ec4;
  --primary-soft: #eaf3fd;
  --success: #16a34a;
  --success-soft: #dcfce7;
  --warn: #d97706;
  --warn-soft: #fef3c7;
  --danger: #dc2626;
  --danger-soft: #fee2e2;
  --gray-soft: #f1f3f5;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
  --shadow-md: 0 4px 12px rgba(16,24,40,.08);
  --shadow-lg: 0 12px 32px rgba(16,24,40,.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: sticky;
  top: 0;
  height: 100vh;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px; }
.brand-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #2383e2, #7c5cff);
  color: #fff; border-radius: 8px;
  display: grid; place-items: center;
  font-size: 18px;
}
.brand-title { font-weight: 700; font-size: 15px; }
.brand-sub { font-size: 12px; color: var(--muted); }

.nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  background: transparent; border: none;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500;
  color: var(--muted);
  text-align: left;
  transition: all .15s;
}
.nav-item span:first-child { font-size: 16px; }
.nav-item:hover { background: var(--gray-soft); color: var(--text); }
.nav-item.active { background: var(--primary-soft); color: var(--primary); }
.nav-badge {
  margin-left: auto;
  background: var(--danger); color: #fff;
  font-size: 11px; font-weight: 600;
  padding: 1px 7px; border-radius: 10px;
  min-width: 18px; text-align: center;
}
.nav-item.active .nav-badge { background: var(--primary); }

.sidebar-footer { border-top: 1px solid var(--border); padding-top: 16px; }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 4px 8px; }
.u-name { font-weight: 600; font-size: 13px; }
.u-role { font-size: 11px; color: var(--muted); }

.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: grid; place-items: center;
  color: #fff; font-weight: 600; font-size: 12px;
  flex-shrink: 0;
}

/* Main */
.main { flex: 1; padding: 28px 32px; max-width: 100%; overflow-x: hidden; }
.topbar {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 24px;
  gap: 16px;
}
.topbar h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
.topbar-actions { display: flex; gap: 8px; }
.muted { color: var(--muted); }
.small { font-size: 12px; }
.ok { color: var(--success); }
.warn { color: var(--warn); }

/* Buttons */
.btn {
  padding: 8px 14px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  transition: all .15s;
}
.btn:hover { background: var(--gray-soft); }
.btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn.danger { color: var(--danger); }
.btn.danger:hover { background: var(--danger-soft); }
.btn.small { padding: 6px 10px; font-size: 12px; }
.btn.ghost { border: none; background: transparent; }
.icon-btn {
  width: 32px; height: 32px; display: grid; place-items: center;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); font-size: 13px;
}
.icon-btn:hover { background: var(--gray-soft); }

/* Tabs */
.tab-panel { display: none; animation: fadeIn .2s ease; }
.tab-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}
.card-head h3 { font-size: 15px; font-weight: 600; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  transition: transform .15s, box-shadow .15s, border-color .15s;
}
.stat-card.clickable { cursor: pointer; }
.stat-card.clickable:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary-soft); }
.data-table tbody tr.clickable { cursor: pointer; }
.calendar .day .event { cursor: pointer; }
.stat-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
.stat-foot { font-size: 11px; }

.grid-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } .sidebar { display: none; } }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 12px 20px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table th { background: #fafbfc; font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
.data-table tbody tr { transition: background .1s; }
.data-table tbody tr:hover { background: #fafbfc; }
.data-table .cell-actions { text-align: right; white-space: nowrap; }
.data-table .cell-actions button { margin-left: 4px; }
.data-table .empty { text-align: center; color: var(--muted); padding: 40px 20px; }

.user-cell { display: flex; align-items: center; gap: 10px; }
.user-cell .avatar { width: 28px; height: 28px; font-size: 11px; }
.user-cell .name { font-weight: 500; }

/* Badges */
.badge { padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; display: inline-block; }
.badge.신청 { background: var(--warn-soft); color: var(--warn); }
.badge.승인완료 { background: var(--success-soft); color: var(--success); }
.badge.반려 { background: var(--danger-soft); color: var(--danger); }
.badge.취소 { background: var(--gray-soft); color: var(--muted); }
.badge-soft { background: var(--gray-soft); color: var(--muted); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }

/* Progress bar */
.progress { height: 6px; background: var(--gray-soft); border-radius: 3px; overflow: hidden; min-width: 100px; }
.progress-bar { height: 100%; background: var(--primary); border-radius: 3px; transition: width .3s; }
.progress-bar.warn { background: var(--warn); }
.progress-bar.danger { background: var(--danger); }

/* Filter */
.filter-row { display: flex; gap: 8px; align-items: center; }
.filter-row input, .filter-row select {
  padding: 7px 10px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  background: var(--surface);
  min-width: 160px;
}
.filter-row input:focus, .filter-row select:focus { outline: 2px solid var(--primary-soft); border-color: var(--primary); }

/* Department chart */
.dept-chart { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
.dept-row { display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 10px; font-size: 12px; }
.dept-row .dept-name { font-weight: 500; }
.dept-row .dept-value { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }

/* Calendar */
.cal-head { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.cal-head h2 { font-size: 17px; font-weight: 600; min-width: 140px; text-align: center; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--border); gap: 1px; padding: 1px; }
.calendar .day-header { background: #fafbfc; padding: 10px; text-align: center; font-weight: 600; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.calendar .day { background: var(--surface); min-height: 110px; padding: 8px; position: relative; display: flex; flex-direction: column; gap: 3px; }
.calendar .day.other-month { background: #fafbfc; }
.calendar .day.other-month .date { color: #c7c7c4; }
.calendar .day.today .date {
  background: var(--primary); color: #fff;
  width: 22px; height: 22px; border-radius: 50%;
  display: grid; place-items: center;
  font-weight: 700;
}
.calendar .day .date { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.calendar .day .event {
  font-size: 11px; padding: 2px 6px; border-radius: 4px;
  color: #fff; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
  transition: transform .1s;
}
.calendar .day .event:hover { transform: translateX(2px); }

.legend { display: flex; flex-wrap: wrap; gap: 14px; padding: 12px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-swatch { width: 10px; height: 10px; border-radius: 3px; }

/* Modal */
.modal {
  position: fixed; inset: 0;
  background: rgba(16,24,40,.5); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  animation: modalIn .15s ease;
}
.modal.hidden { display: none; }
@keyframes modalIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
  background: var(--surface);
  border-radius: var(--radius);
  width: 480px; max-width: 92vw; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalSlide .2s ease;
}
@keyframes modalSlide { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.modal-head h3 { font-size: 16px; font-weight: 600; }
.modal-content form { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
.modal-content label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); font-weight: 500; }
.modal-content input, .modal-content select, .modal-content textarea {
  padding: 9px 11px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
}
.modal-content input:focus, .modal-content select:focus, .modal-content textarea:focus {
  outline: 2px solid var(--primary-soft); border-color: var(--primary);
}
.modal-content textarea { resize: vertical; min-height: 60px; font-family: inherit; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 22px; border-top: 1px solid var(--border); background: #fafbfc; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text); color: #fff;
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn .2s ease;
  z-index: 200;
}
.toast.hidden { display: none; }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacation Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">🏖️</div>
        <div>
          <div class="brand-title">Vacation</div>
          <div class="brand-sub">Manager</div>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-tab="dashboard"><span>📊</span>대시보드</button>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" style="background:#2383e2">관</div>

    <!-- Main -->
    <main class="main">

          <div class="card">
            <div class="card-head"><h3>부서별 사용 연차</h3></div>

      <!-- Calendar -->
      <section id="tab-calendar" class="tab-panel">

          <div class="cal-head">

          <div class="card-head">
            <h3>전체 휴가 신청</h3>

              <select id="reqStatusFilter">
                <option value="">전체 상태</option>
                <option>신청</option>
                <option>승인완료</option>
                <option>반려</option>
                <option>취소</option>
              </select>
            </div>
          </div>
          <table id="requestsTable" class="data-table"></table>
        </div>
      </section>

      <!-- Employees -->
      <section id="tab-employees" class="tab-panel">
        <div class="card">
          <div class="card-head">
            <h3>직원 현황</h3>
            <div class="filter-row">
              <input type="search" id="empSearch" placeholder="🔍 이름/부서 검색..." />
              <button class="btn primary small" id="addEmployeeBtn">＋ 직원 추가</button>
            </div>
          </div>
          <table id="employeesTable" class="data-table"></table>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button class="icon-btn" id="modalClose">✕</button>
      </div>
      <form id="modalForm"></form>
      <div class="modal-actions">
        <button id="modalCancel" class="btn">취소</button>
        <button id="modalSave" class="btn primary">저장</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>
</body>
